<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f4ea" />
      <stop offset="100%" stop-color="#e6eef5" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f2f4f7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#9aa6b2" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="44" y="42" width="872" height="456" rx="28" fill="#ffffff" opacity="0.65" />

  <text x="80" y="96" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#1f2937">
    MNIST Dataset Overview
  </text>
  <text x="80" y="132" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4b5563">
    28x28 grayscale handwritten digits, labels 0-9
  </text>

  <g filter="url(#shadow)">
    <rect x="84" y="174" width="170" height="220" rx="22" fill="url(#card)" stroke="#d8dee6"/>
    <rect x="290" y="174" width="170" height="220" rx="22" fill="url(#card)" stroke="#d8dee6"/>
    <rect x="496" y="174" width="170" height="220" rx="22" fill="url(#card)" stroke="#d8dee6"/>
    <rect x="702" y="174" width="170" height="220" rx="22" fill="url(#card)" stroke="#d8dee6"/>
  </g>

  <g font-family="Consolas, monospace" font-weight="700" text-anchor="middle">
    <text x="169" y="287" font-size="116" fill="#111827">5</text>
    <text x="375" y="287" font-size="116" fill="#111827">0</text>
    <text x="581" y="287" font-size="116" fill="#111827">4</text>
    <text x="787" y="287" font-size="116" fill="#111827">1</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151" text-anchor="middle">
    <text x="169" y="354">sample label = 5</text>
    <text x="375" y="354">sample label = 0</text>
    <text x="581" y="354">sample label = 4</text>
    <text x="787" y="354">sample label = 1</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4b5563">
    <text x="84" y="444">Train set: 60,000 images</text>
    <text x="84" y="474">Test set: 10,000 images</text>
    <text x="520" y="444">Each image is flattened to 784 values when needed.</text>
    <text x="520" y="474">Typical use: image classification for handwritten digits.</text>
  </g>
</svg>
