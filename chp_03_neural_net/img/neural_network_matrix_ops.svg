<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="title desc">
  <title id="title">Neural network with bias</title>
  <desc id="desc">A neural network diagram with 3 input nodes, 3 nodes in the first hidden layer, 2 nodes in the second hidden layer, 2 output nodes, and bias nodes connected to each non-input layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4fbff" />
      <stop offset="55%" stop-color="#fff9f2" />
      <stop offset="100%" stop-color="#f7f7ff" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fbff" />
    </linearGradient>
    <style>
      .page { fill: url(#bg); }
      .panel { fill: url(#panel); stroke: #d7e3f0; stroke-width: 2; }
      .layerCard { fill: #ffffff; stroke: #dbe7f3; stroke-width: 1.5; }
      .edge { stroke: #8da2b8; stroke-width: 2.4; opacity: 0.72; }
      .biasEdge { stroke: #f05a9b; stroke-width: 2.4; stroke-dasharray: 7 7; opacity: 0.9; }
      .inputNode { fill: #d9ecff; stroke: #2f6fed; stroke-width: 3; }
      .hiddenNodeA { fill: #fff1cc; stroke: #f59e0b; stroke-width: 3; }
      .hiddenNodeB { fill: #dff7eb; stroke: #16a34a; stroke-width: 3; }
      .outputNode { fill: #f2e8ff; stroke: #7c3aed; stroke-width: 3; }
      .biasNode { fill: #ffe1ee; stroke: #db2777; stroke-width: 3; }
      .title { fill: #10233d; font-family: Arial, Helvetica, sans-serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #51657d; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .chipText { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .nodeText { fill: #10233d; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .smallText { fill: #5b6f86; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .formula { fill: #16253a; font-family: "Times New Roman", Times, serif; font-size: 24px; font-style: italic; }
      .formulaCard { fill: #eff6ff; stroke: #b9d1ff; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1200" height="720" rx="30" />
  <rect class="panel" x="28" y="28" width="1144" height="664" rx="28" />

  <text class="title" x="62" y="78">Neural Network Structure with Bias</text>
  <text class="subtitle" x="62" y="110">3 inputs, 3 neurons in hidden layer 1, 2 neurons in hidden layer 2, and 2 outputs</text>

  <rect class="layerCard" x="85" y="140" width="170" height="395" rx="28" />
  <rect class="layerCard" x="360" y="140" width="170" height="395" rx="28" />
  <rect class="layerCard" x="635" y="140" width="170" height="395" rx="28" />
  <rect class="layerCard" x="910" y="140" width="170" height="395" rx="28" />

  <text class="chipText" x="112" y="184">Input Layer</text>
  <text class="chipText" x="376" y="184">Hidden Layer 1</text>
  <text class="chipText" x="651" y="184">Hidden Layer 2</text>
  <text class="chipText" x="948" y="184">Output Layer</text>

  <text class="smallText" x="148" y="213">3 neurons</text>
  <text class="smallText" x="423" y="213">3 neurons</text>
  <text class="smallText" x="698" y="213">2 neurons</text>
  <text class="smallText" x="973" y="213">2 neurons</text>

  <line class="edge" x1="198" y1="270" x2="445" y2="270" />
  <line class="edge" x1="198" y1="270" x2="445" y2="380" />
  <line class="edge" x1="198" y1="270" x2="445" y2="490" />
  <line class="edge" x1="198" y1="380" x2="445" y2="270" />
  <line class="edge" x1="198" y1="380" x2="445" y2="380" />
  <line class="edge" x1="198" y1="380" x2="445" y2="490" />
  <line class="edge" x1="198" y1="490" x2="445" y2="270" />
  <line class="edge" x1="198" y1="490" x2="445" y2="380" />
  <line class="edge" x1="198" y1="490" x2="445" y2="490" />

  <line class="edge" x1="473" y1="270" x2="720" y2="325" />
  <line class="edge" x1="473" y1="270" x2="720" y2="435" />
  <line class="edge" x1="473" y1="380" x2="720" y2="325" />
  <line class="edge" x1="473" y1="380" x2="720" y2="435" />
  <line class="edge" x1="473" y1="490" x2="720" y2="325" />
  <line class="edge" x1="473" y1="490" x2="720" y2="435" />

  <line class="edge" x1="748" y1="325" x2="995" y2="325" />
  <line class="edge" x1="748" y1="325" x2="995" y2="435" />
  <line class="edge" x1="748" y1="435" x2="995" y2="325" />
  <line class="edge" x1="748" y1="435" x2="995" y2="435" />

  <line class="biasEdge" x1="445" y1="165" x2="445" y2="242" />
  <line class="biasEdge" x1="445" y1="165" x2="445" y2="352" />
  <line class="biasEdge" x1="445" y1="165" x2="445" y2="462" />

  <line class="biasEdge" x1="720" y1="165" x2="720" y2="297" />
  <line class="biasEdge" x1="720" y1="165" x2="720" y2="407" />

  <line class="biasEdge" x1="995" y1="165" x2="995" y2="297" />
  <line class="biasEdge" x1="995" y1="165" x2="995" y2="407" />

  <circle class="inputNode" cx="170" cy="270" r="28" />
  <circle class="inputNode" cx="170" cy="380" r="28" />
  <circle class="inputNode" cx="170" cy="490" r="28" />
  <text class="nodeText" x="156" y="277">x1</text>
  <text class="nodeText" x="156" y="387">x2</text>
  <text class="nodeText" x="156" y="497">x3</text>

  <circle class="biasNode" cx="445" cy="145" r="20" />
  <text class="nodeText" x="432" y="152">b1</text>
  <circle class="hiddenNodeA" cx="445" cy="270" r="28" />
  <circle class="hiddenNodeA" cx="445" cy="380" r="28" />
  <circle class="hiddenNodeA" cx="445" cy="490" r="28" />
  <text class="nodeText" x="425" y="277">h1</text>
  <text class="nodeText" x="425" y="387">h2</text>
  <text class="nodeText" x="425" y="497">h3</text>

  <circle class="biasNode" cx="720" cy="145" r="20" />
  <text class="nodeText" x="707" y="152">b2</text>
  <circle class="hiddenNodeB" cx="720" cy="325" r="28" />
  <circle class="hiddenNodeB" cx="720" cy="435" r="28" />
  <text class="nodeText" x="700" y="332">g1</text>
  <text class="nodeText" x="700" y="442">g2</text>

  <circle class="biasNode" cx="995" cy="145" r="20" />
  <text class="nodeText" x="982" y="152">b3</text>
  <circle class="outputNode" cx="995" cy="325" r="28" />
  <circle class="outputNode" cx="995" cy="435" r="28" />
  <text class="nodeText" x="976" y="332">y1</text>
  <text class="nodeText" x="976" y="442">y2</text>

  <rect class="formulaCard" x="70" y="570" width="330" height="82" rx="18" />
  <rect class="formulaCard" x="435" y="570" width="330" height="82" rx="18" />
  <rect class="formulaCard" x="800" y="570" width="330" height="82" rx="18" />
  <text class="formula" x="98" y="606">a(1) = W(1)x + b(1)</text>
  <text class="formula" x="128" y="636">z(1) = h(a(1))</text>
  <text class="formula" x="463" y="606">a(2) = W(2)z(1) + b(2)</text>
  <text class="formula" x="493" y="636">z(2) = h(a(2))</text>
  <text class="formula" x="828" y="606">a(3) = W(3)z(2) + b(3)</text>
  <text class="formula" x="903" y="636">y = h(a(3))</text>
</svg>
